<div class="{{ name }}-datepicker-container">
    <input type="text" class="datepicker-input" name="{{ name }}-date-input" autocomplete="off" readonly>
    <div class="datepicker" hidden>

        <div class="datepicker-header">
            <button type="button" class="prev">Prev</button>
        
            <div>
                <select class="month-input">
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>

                <input type="number" class="year-input">
            </div>

            <button type="button" class="next">Next</button>
        </div>

        <div class="days">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
        </div>

        <div class="dates">
            <!-- Dates will be dynamically generated here -->
        </div>
        <!--
        <div class="datepicker-footer">
            <button type="button" class="cancel">Cancel</button>
            <button type="button" class="apply">Apply</button>
        </div>
        -->
    </div>
</div>
